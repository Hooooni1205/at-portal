<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AT 워크스페이스</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css"/>
  <style>
    :root { 
      --bg: #090a0f; 
      --text: #ffffff; 
      --muted: #8b95a5; 
      --primary: #6c5ce7; 
      --accent: #f59e0b; 
    }
    
    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      margin: 0; 
      padding: 0; 
      background-color: var(--bg); 
      color: var(--text); 
      font-family: Pretendard, system-ui, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      position: relative;
      overflow: hidden;
    }

    /* 배경 은은한 빛 효과 */
    .glow-orb-1 {
      position: absolute;
      top: -10%;
      left: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(108,92,231,0.2) 0%, rgba(9,10,15,0) 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .glow-orb-2 {
      position: absolute;
      bottom: -10%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, rgba(9,10,15,0) 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .container { 
      width: 100%; 
      max-width: 420px; 
      padding: 40px 24px; 
      position: relative;
      z-index: 10;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-wrapper { 
      width: 80px; 
      height: 80px; 
      margin: 0 auto 16px; 
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px; 
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .logo-wrapper img {
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
    }
    
    .title { 
      font-size: 26px; 
      font-weight: 900; 
      margin-bottom: 6px; 
      letter-spacing: -0.5px;
    }
    .subtitle { 
      font-size: 14px; 
      color: var(--muted); 
      font-weight: 500;
    }

    .nav-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 글래스모피즘 앱 버튼 스타일 */
    .app-card { 
      display: flex; 
      align-items: center; 
      background: rgba(23, 26, 33, 0.6); 
      border: 1px solid rgba(255, 255, 255, 0.06); 
      padding: 16px; 
      border-radius: 20px; 
      color: var(--text); 
      text-decoration: none; 
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
      backdrop-filter: blur(12px);
    }
    
    .app-card:active { 
      transform: scale(0.96); 
      background: rgba(23, 26, 33, 0.8);
    }

    .app-icon-box {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 16px;
      flex-shrink: 0;
    }

    /* 각 앱별 고유 컬러 */
    .icon-inventory { background: linear-gradient(135deg, rgba(108,92,231,0.2), rgba(108,92,231,0.05)); color: #a29bfe; border: 1px solid rgba(108,92,231,0.2); }
    .icon-recipe { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.05)); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
    /* 새로 추가된 근무 시간표 전용 컬러 (AT 레드) */
    .icon-schedule { background: linear-gradient(135deg, rgba(211,47,47,0.2), rgba(211,47,47,0.05)); color: #ff5252; border: 1px solid rgba(211,47,47,0.2); }

    .app-info {
      flex-grow: 1;
    }
    .app-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .app-desc {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .arrow-icon {
      color: var(--muted);
      opacity: 0.5;
    }

    .footer {
      margin-top: 50px;
      text-align: center;
      font-size: 12px;
      color: #3f4654;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="container">
    <header class="header">
      <div class="logo-wrapper">
        <img src="https://i.postimg.cc/Px3mCDmq/icon.jpg" alt="Logo">
      </div>
      <div class="title">AT 워크스페이스</div>
      <div class="subtitle">매장 통합 관리 시스템</div>
    </header>

    <nav class="nav-grid">
      <a href="https://hooooni1205.github.io/schedule" class="app-card">
        <div class="app-icon-box icon-schedule">📅</div>
        <div class="app-info">
          <div class="app-title">근무 시간표</div>
          <div class="app-desc">스케줄 및 전달사항</div>
        </div>
        <div class="arrow-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </a>

      <a href="https://hooooni1205.github.io/stock-management" class="app-card">
        <div class="app-icon-box icon-inventory">📦</div>
        <div class="app-info">
          <div class="app-title">재고 관리</div>
          <div class="app-desc">실시간 매장/창고 재고 파악</div>
        </div>
        <div class="arrow-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </a>

      <a href="https://hooooni1205.github.io/at-docs" class="app-card">
        <div class="app-icon-box icon-recipe">🥤</div>
        <div class="app-info">
          <div class="app-title">레시피 가이드</div>
          <div class="app-desc">최신 제조법 및 공지사항</div>
        </div>
        <div class="arrow-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </a>
    </nav>

    </div>
</body>
</html>
